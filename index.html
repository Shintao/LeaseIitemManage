<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>緊急デバッグ画面</title>
  <style>
    body { background: #222; color: #fff; font-family: monospace; padding: 20px; }
    h1 { color: #ff4757; font-size: 20px; }
    #error-box { background: #fff; color: #000; padding: 15px; border-radius: 5px; min-height: 100px; white-space: pre-wrap; font-size: 14px; border-left: 10px solid #ff4757; margin-bottom: 20px; }
    #flow-log { background: #000; color: #00ff00; padding: 15px; border-radius: 5px; height: 200px; overflow-y: auto; font-size: 12px; border: 1px solid #333; }
  </style>
</head>
<body>

  <h1>🚨 JavaScript エラー強制捕捉システム</h1>
  <p>もしコードのどこかでクラッシュしている場合、下の白い箱に原因が表示されます。</p>
  
  <div id="error-box">【エラーは検出されていません（まだJavaScriptが動いていないか、正常です）】</div>

  <h3>🐾 実行プロセスの足跡</h3>
  <div id="flow-log"></div>

  <script>
    // 1. 何よりも先にエラー捕獲網を張る
    window.onerror = function(message, source, lineno, colno, error) {
      const box = document.getElementById('error-box');
      if (box) {
        box.style.color = '#d63031';
        box.innerText = `❌ エラーを検出しました！\n\n【内容】: ${message}\n【場所】: ${source}\n【行数】: ${lineno}行目 (列: ${colno})`;
      }
      return false;
    };

    function dbgLog(msg) {
      const logDiv = document.getElementById('flow-log');
      if (logDiv) {
        const now = new Date();
        logDiv.innerHTML += `[${now.toLocaleTimeString()}] ${msg}<br>`;
      }
    }

    // 2. 順を追ってログを出力
    dbgLog("1. スクリプトの先頭を通過しました。");

    window.onload = function() {
      dbgLog("2. window.onload (ページの読み込み完了イベント) が発火しました。");
      
      try {
        dbgLog("3. テスト処理：ダミーの要素操作を試みます。");
        const box = document.getElementById('error-box');
        dbgLog("4. テスト処理成功：DOMへのアクセスは正常です。");
        
        dbgLog("5. カメラ機能の存在チェックを行います...");
        if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
          dbgLog("6. ✅ ブラウザはカメラAPI（getUserMedia）をサポートしています。");
        } else {
          dbgLog("6. ❌ ブラウザがカメラAPIを認識していません（HTTP環境、または古いブラウザの可能性）。");
        }
        
      } catch(e) {
        dbgLog(`❌ onload内の処理で例外をキャッチしました: ${e.message}`);
      }
    };
  </script>
</body>
</html>
