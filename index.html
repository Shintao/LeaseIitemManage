<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chromebook等 貸出管理システム（本格運用版）</title>
  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
  <style>
    html, body { height: 100%; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #f4f6f9; color: #333; }
    .app-container { display: flex; flex-direction: column; height: 100%; max-width: 1200px; margin: 0 auto; padding: 15px; box-sizing: border-box; }
    
    .header-area { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; border-bottom: 2px solid #ddd; padding-bottom: 10px; }
    h2 { margin: 0; color: #2c3e50; font-size: 22px; }
    
    /* モード切替ラジオボタン */
    .mode-container { display: flex; gap: 10px; }
    .mode-container input { display: none; }
    .mode-container label { text-align: center; padding: 10px 20px; font-size: 16px; font-weight: bold; cursor: pointer; border: 2px solid #bdc3c7; border-radius: 8px; background-color: #fff; transition: all 0.2s; }
    input[value="利用者へ貸出"]:checked + label { background-color: #3498db; color: white; border-color: #2980b9; }
    input[value="利用者から返却"]:checked + label { background-color: #2ecc71; color: white; border-color: #27ae60; }
    input[value="端末新規登録"]:checked + label { background-color: #9b59b6; color: white; border-color: #8e44ad; }
    input[value="端末登録解除"]:checked + label { background-color: #e67e22; color: white; border-color: #d35400; }
    
    /* Chromebook用 左右2カラムレイアウト */
    .main-layout { display: flex; gap: 20px; flex: 1; min-height: 0; }
    .left-panel { flex: 1.1; display: flex; flex-direction: column; min-height: 0; gap: 12px; }
    .right-panel { flex: 0.9; display: flex; flex-direction: column; min-height: 0; gap: 12px; }
    
    /* 📷 カメラエリア */
    #video-container { position: relative; width: 100%; height: 260px; background-color: #000; border-radius: 8px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
    video { width: 100%; height: 100%; object-fit: contain; display: block; }
    
    #scan-overlay { position: absolute; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); color:#fff; display:flex; justify-content:center; align-items:center; font-size:18px; font-weight:bold; z-index: 2; pointer-events: none; }
    #scan-overlay.active { background: rgba(52, 152, 219, 0.15); color: transparent; border: 5px solid #3498db; box-sizing: border-box; }

    /* 🔘 操作ボタン */
    .btn-group { display: flex; flex-direction: column; gap: 10px; }
    #action-btn { width: 100%; padding: 18px; font-size: 22px; font-weight: bold; color: white; background-color: #2c3e50; border: none; border-radius: 8px; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.1); transition: background-color 0.2s; }
    #cancel-btn { width: 100%; padding: 14px; font-size: 18px; font-weight: bold; color: white; background-color: #e74c3c; border: none; border-radius: 8px; cursor: pointer; box-shadow: 0 3px 5px rgba(0,0,0,0.1); display: none; }
    #action-btn:disabled { background-color: #bdc3c7; cursor: not-allowed; box-shadow: none; }
    
    /* ステータス表示 */
    #status { padding: 15px; font-size: 16px; font-weight: bold; border-radius: 8px; background-color: #fff; border-left: 8px solid #bdc3c7; box-shadow: 0 2px 5px rgba(0,0,0,0.05); min-height: 56px; display: flex; align-items: center; white-space: pre-wrap; line-height: 1.5; }
    
    /* 📄 システム内部ログ */
    .log-panel { display: flex; flex-direction: column; background: #fff; border-radius: 8px; padding: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); height: 200px; min-height: 200px; }
    .log-panel h3 { margin: 0 0 8px 0; font-size: 14px; color: #7f8c8d; border-bottom: 1px solid #ecf0f1; padding-bottom: 4px; }
    #debug-console { flex: 1; background: #222; color: #00ff00; font-family: monospace; font-size: 12px; padding: 10px; border-radius: 5px; overflow-y: auto; white-space: pre-wrap; }
    
    /* 在庫状況パネル（元の2列仕様に美しく復元） */
    .stock-panel { padding: 15px; background: #fff; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
    .stock-panel h3 { margin: 0 0 10px 0; font-size: 14px; color: #7f8c8d; border-bottom: 1px solid #ecf0f1; padding-bottom: 4px; }
    .stock-grid { display: flex; justify-content: space-around; }
    .stock-item { text-align: center; font-size: 14px; }
    .stock-count { font-size: 26px; font-weight: bold; color: #2c3e50; margin-top: 6px; }
    .stock-count.low { color: #e74c3c; }
    #loading-overlay { position: absolute; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); color:#fff; display:flex; justify-content:center; align-items:center; font-size:16px; z-index: 10; }
  </style>
</head>
<body>

  <div class="app-container">
    <div class="header-area">
      <h2>Chromebook等 貸出管理システム</h2>
      <div class="mode-container">
        <input type="radio" id="m-rent" name="mode" value="利用者へ貸出" checked>
        <label for="m-rent">📤 貸出</label>
        <input type="radio" id="m-return" name="mode" value="利用者から返却">
        <label for="m-return">📥 返却</label>
        <input type="radio" id="m-add" name="mode" value="端末新規登録">
        <label for="m-add">➕ 登録</label>
        <input type="radio" id="m-del" name="mode" value="端末登録解除">
        <label for="m-del">❌ 解除</label>
      </div>
    </div>

    <div class="main-layout">
      <div class="left-panel">
        <div id="video-container">
          <video id="video" autoplay playsinline muted></video>
          <div id="scan-overlay">⏸️ スキャン停止中</div>
          <div id="loading-overlay">カメラ初期化中...</div>
        </div>

        <div class="btn-group">
          <button id="action-btn">🔍 スキャンを開始する</button>
          <button id="cancel-btn">🛑 スキャンを中断する</button>
        </div>
        
        <div id="status">モードを選択し、ボタンを押して開始してください</div>
      </div>

      <div class="right-panel">
        <div class="log-panel">
          <h3>🚨 システム内部動作ログ</h3>
          <div id="debug-console">--- 運用ログ開始 ---&#13;</div>
        </div>

        <div class="stock-panel">
          <h3>現在の貸出可能在庫</h3>
          <div class="stock-grid">
            <div class="stock-item">
              <div>💻 予備機 (9900番台)</div>
              <div class="stock-count" id="stock-pc">---</div>
            </div>
            <div class="stock-item">
              <div>🔋 モバイルバッテリー</div>
              <div class="stock-count" id="stock-battery">---</div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <canvas id="canvas" style="display:none;"></canvas>

  <script>
    const FORM_URL = "https://docs.google.com/forms/d/e/1FAIpQLSdWhiNc9YuYfA61ONMIBHAx9MhegFJRCIdCwVWyorLlXO4Xgw/formResponse";
    const ENTRY_MODE = "entry.866648275";
    const ENTRY_DATA1 = "entry.1165154720";
    const ENTRY_DATA2 = "entry.1094519910";

    const STOCK_API_URL = "https://script.google.com/a/macros/city.hamamatsu-szo.ed.jp/s/AKfycbyqZyifkr6rSvF6Sr4OnKnq66veG78msCcggYL-3QOLGqd96QzWXrgPruKXg3dBDAqR/exec"; 

    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const statusDiv = document.getElementById('status');
    const overlay = document.getElementById('loading-overlay');
    const scanOverlay = document.getElementById('scan-overlay');
    const actionBtn = document.getElementById('action-btn');
    const cancelBtn = document.getElementById('cancel-btn');
    const debugConsole = document.getElementById('debug-console');
    
    let isScanning = false; 
    let currentMode = "利用者へ貸出";
    let savedStudentId = ""; 
    let savedStudentName = ""; 
    let tickCount = 0;

    function log(msg) {
      const now = new Date();
      const timeStr = now.toLocaleTimeString();
      debugConsole.innerHTML += `[${timeStr}] ${msg}&#13;`;
      debugConsole.scrollTop = debugConsole.scrollHeight;
    }

    document.querySelectorAll('input[name="mode"]').forEach(radio => {
      radio.addEventListener('change', (e) => {
        currentMode = e.target.value;
        localStorage.setItem('selectedMode', currentMode); 
        log(`モードが切り替わりました -> ${currentMode}`);
        resetSystemState();
      });
    });

    window.addEventListener('DOMContentLoaded', () => {
      const savedMode = localStorage.getItem('selectedMode');
      if (savedMode) {
        let targetValue = savedMode;
        if (savedMode === "生徒へ貸出") targetValue = "利用者へ貸出";
        if (savedMode === "生徒から返却") targetValue = "利用者から返却";
        
        const radio = document.querySelector(`input[value="${targetValue}"]`);
        if (radio) { radio.checked = true; currentMode = targetValue; }
      }
    });

    actionBtn.addEventListener('click', () => {
      if (isScanning) return; 
      
      isScanning = true; 
      tickCount = 0;
      scanOverlay.innerText = "";
      scanOverlay.className = "active";
      actionBtn.disabled = true; 
      
      cancelBtn.style.display = "block";
      
      if (currentMode === "利用者へ貸出") {
        if (!savedStudentId) {
          log("【スキャン開始】1回目：利用者IDのQRコードを待機中...");
          updateStatus("【利用者IDスキャン中】\n利用者の「4桁数字ID」のQRをカメラにかざしてください。", "#3498db");
        } else {
          log(`【スキャン開始】2回目：端末QRコードを待機中... (利用者: ${savedStudentName} [ID: ${savedStudentId}])`);
          updateStatus(`【機体QRスキャン中】\n貸し出す機体のQRをかざしてください。\n[対象者: ${savedStudentName} (${savedStudentId})]`, "#e67e22");
        }
      } else if (currentMode === "利用者から返却") {
        log("【スキャン開始】返却端末のQRコードを待機中...");
        updateStatus("【返却スキャン中】\n返却する端末のQRコードをかざしてください。", "#2ecc71");
      } else if (currentMode === "端末新規登録") {
        log("【スキャン開始】新規登録する端末のQRコードを待機中...");
        updateStatus("【新規登録スキャン中】\nマスターに登録する端末のQRコードをかざしてください。", "#9b59b6");
      } else {
        log("【スキャン開始】削除する端末のQRコードを待機中...");
        updateStatus("【登録解除スキャン中】\nマスターから除籍する端末のQRコードをかざしてください。", "#e67e22");
      }

      tick();
    });

    cancelBtn.addEventListener('click', () => {
      log("🛑 中断ボタンが押されました。初期状態にリセットします。");
      resetSystemState();
      fetchStockInfo(); 
    });

    function resetSystemState() {
      isScanning = false;
      savedStudentId = "";
      savedStudentName = "";
      scanOverlay.innerText = "⏸️ スキャン停止中";
      scanOverlay.className = "";
      actionBtn.disabled = false;
      
      cancelBtn.style.display = "none";
      
      if (currentMode === "利用者へ貸出") {
        actionBtn.innerText = "🔍 利用者IDのスキャンを開始";
        actionBtn.style.backgroundColor = "#3498db";
        updateStatus("【貸出モード：待機中】\n上の「利用者IDのスキャンを開始」を押してください。", "#3498db");
      } else if (currentMode === "利用者から返却") {
        actionBtn.innerText = "🔍 返却スキャンを開始";
        actionBtn.style.backgroundColor = "#2ecc71";
        updateStatus("【返却モード：待機中】\n上の「返却スキャンを開始」を押してください。", "#2ecc71");
      } else if (currentMode === "端末新規登録") {
        actionBtn.innerText = "🔍 新規登録スキャンを開始";
        actionBtn.style.backgroundColor = "#9b59b6";
        updateStatus("【管理者：端末登録マスター】\n上のボタンを押して新規登録スキャンを開始してください。", "#9b59b6");
      } else {
        actionBtn.innerText = "🔍 登録解除スキャンを開始";
        actionBtn.style.backgroundColor = "#e67e22";
        updateStatus("【管理者：端末除籍マスター】\n上のボタンを押して削除するスキャンを開始してください。", "#e67e22");
      }
    }

    function updateStatus(text, color) {
      statusDiv.style.borderLeftColor = color;
      statusDiv.style.color = color;
      statusDiv.innerText = text;
    }

    log("カメラデバイスの初期化を要請中...");
    navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" }, audio: false })
    .then(stream => { 
      video.srcObject = stream; 
      overlay.style.display = "none"; 
      log("✅ カメラの起動に成功しました。準備完了。");
      resetSystemState();
    })
    .catch(err => { 
      overlay.innerText = "❌ カメラエラー: " + err.message;
      log(`❌ カメラ起動エラー: ${err.message}`);
      updateStatus("カメラが起動できません。権限を確認してください。", "red");
    });

    function tick() {
      if (!isScanning) return; 

      if (video.readyState === video.HAVE_ENOUGH_DATA) {
        const context = canvas.getContext('2d');
        canvas.height = video.videoHeight; canvas.width = video.videoWidth;
        context.drawImage(video, 0, 0, canvas.width, canvas.height);
        const imageData = context.getImageData(0, 0, canvas.width, canvas.height);
        const code = jsQR(imageData.data, imageData.width, imageData.height, { inversionAttempts: "dontInvert" });

        if (code) {
          const scannedText = code.data.trim();
          log(`🎯 QR検出成功: [${scannedText}]`);
          
          if (currentMode === "利用者へ貸出" && savedStudentId !== "" && scannedText === savedStudentId) {
            log("残像検知: 1回目の利用者IDがまだ映っているためスルーします");
            requestAnimationFrame(tick);
            return;
          }
          
          isScanning = false; 
          handleScannedData(scannedText);
          return; 
        }
      }
      requestAnimationFrame(tick);
    }

    function handleScannedData(scannedText) {
      scanOverlay.innerText = "⏸️ スキャン停止中";
      scanOverlay.className = "";

      if (currentMode === "利用者へ貸出") {
        if (!savedStudentId) {
          if (/^\d{4}$/.test(scannedText)) { 
            fetchUserName(scannedText);
          } else {
            log(`❌ 判定エラー: [${scannedText}] は4桁の数字ではありません。`);
            updateStatus("❌ エラー: 利用者の4桁数字IDではありません。やり直します。", "red");
            setTimeout(() => { resetSystemState(); }, 2500);
          }
        } else {
          log(`🚀 送信準備: 利用者 [${savedStudentName} (${savedStudentId})] ➔ 端末 [${scannedText}]`);
          executeSubmit(currentMode, savedStudentId, scannedText);
        }
      } else {
        log(`🚀 送信準備: モード [${currentMode}] ➔ 端末 [${scannedText}]`);
        executeSubmit(currentMode, scannedText, "");
      }
    }

    function fetchUserName(id) {
      updateStatus("🔍 利用者マスターを照会中...", "#7f8c8d");
      const callbackName = 'jsonp_name_' + Math.round(100000 * Math.random());
      
      window[callbackName] = function(data) {
        savedStudentId = id;
        savedStudentName = data.name;
        log(`✅ 利用者特定: ID [${id}] ➔ 名前: [${savedStudentName}]`);
        
        updateStatus(`👤 利用者: ${savedStudentName} さんをロックしました。\n貸し出す【機体のQR】を正面に準備し、上のボタンを押してください。`, "#2c3e50");
        actionBtn.innerText = "🔍 端末QRのスキャンを開始";
        actionBtn.style.backgroundColor = "#e67e22"; 
        actionBtn.disabled = false;
        cancelBtn.style.display = "block";
        
        delete window[window[callbackName]];
        document.getElementById(callbackName).remove();
      };
      
      const script = document.createElement('script');
      script.id = callbackName;
      script.src = STOCK_API_URL + (STOCK_API_URL.indexOf('?') >= 0 ? '&' : '?') + 'action=getName&id=' + id + '&callback=' + callbackName;
      script.onerror = function() {
        savedStudentId = id;
        savedStudentName = "名前取得エラー(未登録の可能性)";
        updateStatus(`👤 利用者ID: [${id}] をロックしました（名前取得失敗）。\nそのまま貸し出す場合は、上のボタンを押してください。`, "#2c3e50");
        actionBtn.innerText = "🔍 端末QRのスキャンを開始";
        actionBtn.style.backgroundColor = "#e67e22"; 
        actionBtn.disabled = false;
      };
      document.body.appendChild(script);
    }

    async function executeSubmit(mode, data1, data2) {
      updateStatus("⏳ データを送信中...", "#7f8c8d");
      cancelBtn.style.display = "none";
      
      const safeData1 = (data1 === "" || data1 === undefined || data1 === null) ? " " : data1;
      const safeData2 = (data2 === "" || data2 === undefined || data2 === null) ? " " : data2;

      const formData = new FormData();
      formData.append(ENTRY_MODE, mode === "利用者へ貸出" ? "生徒へ貸出" : mode === "利用者から返却" ? "生徒から返却" : mode);
      formData.append(ENTRY_DATA1, safeData1);
      formData.append(ENTRY_DATA2, safeData2);

      try {
        await fetch(FORM_URL, { method: "POST", mode: "no-cors", body: formData });
        log(`✅ Googleフォームへのデータ送信を完了しました。`);
        
        if (mode === "利用者へ貸出") {
          updateStatus(`✅ 貸出完了！\n${savedStudentName} さん (${data1}) へ 端末 [${data2}] を登録しました。`, "#2ecc71");
        } else if (mode.indexOf("返却") !== -1) {
          updateStatus(`✅ 返却完了！\n端末 [${data1}] をフリーに戻しました。`, "#2ecc71");
        } else if (mode.indexOf("新規") !== -1 || mode.indexOf("登録") !== -1) {
          updateStatus(`✅ 新規登録完了！\n端末 [${data1}] をマスターに追加。`, "#9b59b6");
        } else {
          updateStatus(`✅ 登録解除完了！\n端末 [${data1}] を除籍しました。`, "#e67e22");
        }
        
        log("🔄 貸出/返却完了に伴い、在庫数表示の更新リクエストを送信しました...");
        fetchStockInfo();
        
      } catch (e) {
        log(`❌ 送信エラーが発生しました: ${e.message}`);
        updateStatus("❌ 送信失敗:\n" + e.message, "red");
      }
      setTimeout(() => { resetSystemState(); }, 3000);
    }

function fetchStockInfo() {
      if (!STOCK_API_URL) return;
      const callbackName = 'jsonp_callback_' + Math.round(100000 * Math.random());
      window[callbackName] = function(data) {
        // 💡 画面上の「予備機」と「バッテリー」の表示エリアを取得
        const pcEl = document.getElementById('stock-pc');
        const batEl = document.getElementById('stock-battery');
        
        // 💡 GAS（doGet）から返ってきた正しいキー名（data.pc と data.battery）を代入
        pcEl.innerText = data.pc + " 台"; 
        batEl.innerText = data.battery + " 個";
        
        // 残数の警告色クラスの制御
        if(data.pc <= 2) pcEl.classList.add('low'); else pcEl.classList.remove('low');
        if(data.battery <= 2) batEl.classList.add('low'); else batEl.classList.remove('low');
        
        log(`📊 最新在庫に同期しました。[予備:${data.pc}台 / バッテリー:${data.battery}個]`);
        
        delete window[window[callbackName]]; 
        document.getElementById(callbackName).remove();
      };
      
      const script = document.createElement('script'); 
      script.id = callbackName;
      script.src = STOCK_API_URL + (STOCK_API_URL.indexOf('?') >= 0 ? '&' : '?') + 'callback=' + callbackName;
      script.onerror = function() { 
        document.getElementById('stock-pc').innerText = "エラー"; 
        document.getElementById('stock-battery').innerText = "エラー"; 
      };
      document.body.appendChild(script);
    }
    window.onload = () => { fetchStockInfo(); };
  </script>
</body>
</html>
