<!DOCTYPE html>
<html lang="ja">
<script>
  // ... (定数定義はそのまま) ...
  let isScanning = false;
  let currentMode = "利用者へ貸出";
  let savedStudentId = "";
  let savedStudentName = "";
  let scanTimeoutTimer = null; // タイムアウト用タイマーを追加

  // 1分間タイマーの設定と解除
  function startScanTimeout() {
    clearScanTimeout();
    scanTimeoutTimer = setTimeout(() => {
      if (isScanning) {
        log("⚠️ スキャンタイムアウト");
        playSound("error");
        updateStatus("時間切れです。もう一度スキャンを開始してください。", "red");
        resetSystemState();
      }
    }, 60000); // 60秒
  }

  function clearScanTimeout() {
    if (scanTimeoutTimer) {
      clearTimeout(scanTimeoutTimer);
      scanTimeoutTimer = null;
    }
  }

  // スキャン開始時の処理を強化
  actionBtn.addEventListener('click', () => {
    if (isScanning) return;
    isScanning = true;
    scanOverlay.className = "active";
    actionBtn.disabled = true;
    manualBtn.disabled = true;
    cancelBtn.style.display = "block";
    
    startScanTimeout(); // ★ここで1分タイマー発動
    tick();
  });

  // 送信処理（返却時はdata2を空にせず、そもそもappendしない形へ）
  async function executeSubmit(mode, data1, data2) {
    clearScanTimeout(); // 通信中はタイマーを止める
    updateStatus("⏳ データを送信中...", "#7f8c8d");
    
    const formData = new FormData();
    const sendMode = (mode === "利用者へ貸出") ? "生徒へ貸出" : (mode === "利用者から返却") ? "生徒から返却" : mode;
    
    formData.append(ENTRY_MODE, sendMode);
    formData.append(ENTRY_DATA1, data1 || " ");
    
    // 🌟 返却時はdata2を付与しない（元々の正常動作ロジックに忠実）
    if (mode === "利用者へ貸出" && data2) {
      formData.append(ENTRY_DATA2, data2);
    }

    try {
      await fetch(FORM_URL, { method: "POST", mode: "no-cors", body: formData });
      playSound("success");
      updateStatus("✅ 送信完了しました。", "#2ecc71");
      
      // 送信成功後にのみリセット
      setTimeout(() => {
        fetchStockInfo();
        resetSystemState();
      }, 2000);
    } catch (e) {
      playSound("error");
      updateStatus("❌ 送信失敗", "red");
      setTimeout(() => resetSystemState(), 3000);
    }
  }

  // 既存のresetSystemStateにタイマー解除を追加
  function resetSystemState() {
    isScanning = false;
    clearScanTimeout(); // ★必須：リセット時は必ずタイマーを消す
    savedStudentId = "";
    savedStudentName = "";
    // ...以降の描画処理はそのまま...
    actionBtn.disabled = false;
    manualBtn.disabled = false;
    cancelBtn.style.display = "none";
    // (以下、各モードのUI反映...)
  }

  // tick関数内でも同様に
  function tick() {
    if (!isScanning) return;
    // ...QR読み取りロジック...
    if (code) {
      clearScanTimeout(); // ★読み取った瞬間にタイマー解除
      isScanning = false;
      handleScannedData(code.data.trim());
      return;
    }
    requestAnimationFrame(tick);
  }
  // ... (その他、既存の関数) ...
</script>
