<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chromebook等 貸出管理システム（完全統合版）</title>
  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
  <style>
    /* CSSはあなたの元のコードを維持 */
  </style>
</head>
<body>
  <script>
    // --- 元の定数と変数を維持 ---
    const FORM_URL = "https://docs.google.com/forms/d/e/1FAIpQLSdWhiNc9YuYfA61ONMIBHAx9MhegFJRCIdCwVWyorLlXO4Xgw/formResponse";
    const ENTRY_MODE = "entry.866648275";
    const ENTRY_DATA1 = "entry.1165154720";
    const ENTRY_DATA2 = "entry.1094519910";
    const STOCK_API_URL = "https://script.google.com/a/macros/city.hamamatsu-szo.ed.jp/s/AKfycbxGmBTg8T4quolzCtotdF3j_V0iWTpd7O2wvbsZ0i3saM3pAPekDj98npUVaGCqe2oMFQ/exec"; 

    // --- 追加のグローバル変数 ---
    let scanTimeoutTimer = null;

    // --- 【修正1】タイマー管理関数 (追加) ---
    function startScanTimeout() {
      clearTimeout(scanTimeoutTimer);
      scanTimeoutTimer = setTimeout(() => {
        if (isScanning) {
          log("⚠️ タイムアウト: 初期状態に戻します");
          resetSystemState();
        }
      }, 60000);
    }

    // --- 【修正2】スキャン開始ボタン (startScanTimeoutを追加) ---
    actionBtn.addEventListener('click', () => {
      if (isScanning) return; 
      isScanning = true; 
      tickCount = 0;
      scanOverlay.innerText = "";
      scanOverlay.className = "active";
      actionBtn.disabled = true; 
      manualBtn.disabled = true; 
      cancelBtn.style.display = "block";
      
      startScanTimeout(); // 追加
      tick();
    });

    // --- 【修正3】executeSubmit (DATA2空送信対策) ---
    async function executeSubmit(mode, data1, data2) {
      clearTimeout(scanTimeoutTimer); // 送信開始時にタイマーを止める
      updateStatus("⏳ データを送信中...", "#7f8c8d");
      
      const formData = new FormData();
      formData.append(ENTRY_MODE, mode === "利用者へ貸出" ? "生徒へ貸出" : mode === "利用者から返却" ? "生徒から返却" : mode);
      formData.append(ENTRY_DATA1, data1 || " ");
      
      // ここが返却処理の修正点：貸出以外はdata2をappendしない
      if (mode === "利用者へ貸出" && data2 && data2.trim() !== "") {
        formData.append(ENTRY_DATA2, data2);
      }

      try {
        await fetch(FORM_URL, { method: "POST", mode: "no-cors", body: formData });
        playSound("success"); 
        log(`✅ 送信成功: [${mode}]`);
        updateStatus(`✅ 処理完了しました。`, "#2ecc71");
        setTimeout(() => { fetchStockInfo(); resetSystemState(); }, 2000);
      } catch (e) {
        playSound("error"); 
        updateStatus("❌ 送信失敗", "red");
        setTimeout(() => { resetSystemState(); }, 3000);
      }
    }

    // --- 【修正4】tick関数 (読み取り成功時にタイマーを止める) ---
    // (あなたのコード内の if (code) { ... } ブロック内に以下を追加)
    if (code) {
      clearTimeout(scanTimeoutTimer); // タイマー停止
      isScanning = false;
      handleScannedData(code.data.trim());
      return;
    }

    // --- 【修正5】resetSystemState ---
    function resetSystemState() {
      clearTimeout(scanTimeoutTimer); // リセット時にタイマー解除
      isScanning = false;
      // (以下、あなたの元のresetSystemState内の処理をそのまま記述)
    }

    // --- カメラ初期化 (あなたの元のコードをそのまま維持) ---
    // ここは触っていません。カメラ初期化で止まるのは他のコードとの干渉です。
  </script>
</body>
</html>
