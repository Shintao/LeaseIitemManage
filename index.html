<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chromebook等 貸出管理システム（完全版）</title>
  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
  <style>
    /* CSSはそのまま使用可能です */
    html, body { min-height: 100%; margin: 0; padding: 0; font-family: sans-serif; background-color: #f4f6f9; }
    .app-container { display: flex; flex-direction: column; max-width: 1200px; margin: 0 auto; padding: 15px; }
    .header-area { display: flex; justify-content: space-between; margin-bottom: 12px; }
    #status { padding: 20px; font-size: 24px; font-weight: bold; background: #fff; margin-bottom: 15px; border-left: 10px solid #bdc3c7; }
    .main-layout { display: flex; gap: 20px; }
    .left-panel { flex: 1.1; }
    .right-panel { flex: 0.9; }
    #video-container { position: relative; width: 100%; height: 220px; background: #000; }
    video { width: 100%; height: 100%; object-fit: contain; }
    #scan-overlay { position: absolute; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); color:#fff; display:flex; justify-content:center; align-items:center; font-size:16px; pointer-events:none; }
    #scan-overlay.active { background: rgba(52, 152, 219, 0.15); border: 5px solid #3498db; }
    #action-btn { width: 100%; padding: 18px; font-size: 20px; font-weight: bold; cursor: pointer; }
    .log-panel { background: #fff; padding: 12px; height: 200px; }
    #debug-console { font-family: monospace; font-size: 12px; overflow-y: auto; height: 160px; background: #222; color: #00ff00; }
  </style>
</head>
<body>

  <div class="app-container">
    <div class="header-area">
      <h2>Chromebook等 貸出管理システム</h2>
      <div class="mode-container">
        <input type="radio" id="m-rent" name="mode" value="利用者へ貸出" checked> <label for="m-rent">貸出</label>
        <input type="radio" id="m-return" name="mode" value="利用者から返却"> <label for="m-return">返却</label>
      </div>
    </div>

    <div id="status">モードを選択し、ボタンを押してください</div>

    <div class="main-layout">
      <div class="left-panel">
        <div id="video-container">
          <video id="video" autoplay playsinline muted></video>
          <div id="scan-overlay">⏸️ スキャン停止中</div>
        </div>
        <button id="action-btn">🔍 スキャンを開始する</button>
        <button id="cancel-btn" style="display:none;">🛑 中断</button>
      </div>
      <div class="right-panel">
        <div class="log-panel">
          <h3>ログ</h3>
          <div id="debug-console">--- 運用ログ開始 ---</div>
        </div>
      </div>
    </div>
  </div>

  <canvas id="canvas" style="display:none;"></canvas>

  <script>
    const FORM_URL = "https://docs.google.com/forms/d/e/1FAIpQLSdWhiNc9YuYfA61ONMIBHAx9MhegFJRCIdCwVWyorLlXO4Xgw/formResponse";
    const ENTRY_MODE = "entry.866648275";
    const ENTRY_DATA1 = "entry.1165154720";
    const ENTRY_DATA2 = "entry.1094519910";

    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const actionBtn = document.getElementById('action-btn');
    const cancelBtn = document.getElementById('cancel-btn');
    const debugConsole = document.getElementById('debug-console');
    const scanOverlay = document.getElementById('scan-overlay');
    const statusDiv = document.getElementById('status');

    let isScanning = false;
    let currentMode = "利用者へ貸出";
    let scanTimeoutTimer = null; // 1分タイマー用変数

    // 1分タイマーの定義
    function startScanTimeout() {
      clearTimeout(scanTimeoutTimer);
      scanTimeoutTimer = setTimeout(() => {
        if (isScanning) {
          log("⚠️ 60秒経過：タイムアウトしました");
          resetSystemState();
        }
      }, 60000);
    }

    function log(msg) {
      debugConsole.innerHTML += `<br>${msg}`;
      debugConsole.scrollTop = debugConsole.scrollHeight;
    }

    function updateStatus(text, color) {
      statusDiv.style.borderLeftColor = color;
      statusDiv.style.color = color;
      statusDiv.innerText = text;
    }

    // 正常動作時の送信ロジックを忠実に再現
    async function executeSubmit(mode, data1, data2) {
      clearTimeout(scanTimeoutTimer); // 送信時はタイマー解除
      updateStatus("⏳ 送信中...", "#7f8c8d");
      
      const formData = new FormData();
      const sendMode = (mode === "利用者へ貸出") ? "生徒へ貸出" : (mode === "利用者から返却") ? "生徒から返却" : mode;
      
      formData.append(ENTRY_MODE, sendMode);
      formData.append(ENTRY_DATA1, data1);
      
      // 返却時は ENTRY_DATA2 を送らない構造を維持
      if (mode === "利用者へ貸出" && data2) {
        formData.append(ENTRY_DATA2, data2);
      }

      try {
        await fetch(FORM_URL, { method: "POST", mode: "no-cors", body: formData });
        updateStatus("✅ 送信完了", "#2ecc71");
        setTimeout(resetSystemState, 2000);
      } catch (e) {
        updateStatus("❌ 送信失敗", "red");
        setTimeout(resetSystemState, 3000);
      }
    }

    function resetSystemState() {
      isScanning = false;
      clearTimeout(scanTimeoutTimer);
      scanOverlay.innerText = "⏸️ スキャン停止中";
      scanOverlay.className = "";
      actionBtn.disabled = false;
      cancelBtn.style.display = "none";
      updateStatus("準備完了。ボタンを押してください。", "#3498db");
    }

    actionBtn.addEventListener('click', () => {
      isScanning = true;
      actionBtn.disabled = true;
      cancelBtn.style.display = "block";
      scanOverlay.className = "active";
      scanOverlay.innerText = "📷 スキャン中...";
      startScanTimeout(); // 1分タイマー起動
      tick();
    });

    cancelBtn.addEventListener('click', resetSystemState);

    function tick() {
      if (!isScanning) return;
      if (video.readyState === video.HAVE_ENOUGH_DATA) {
        const ctx = canvas.getContext('2d');
        canvas.height = video.videoHeight; canvas.width = video.videoWidth;
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        const code = jsQR(ctx.getImageData(0,0,canvas.width, canvas.height).data, canvas.width, canvas.height);
        
        if (code) {
          isScanning = false;
          executeSubmit(currentMode, code.data.trim(), ""); // 返却時はここがdata1になる
          return;
        }
      }
      requestAnimationFrame(tick);
    }

    // カメラ起動
    navigator.mediaDevices.getUserMedia({video: {facingMode: "user"}}).then(s => video.srcObject = s);
  </script>
</body>
</html>
