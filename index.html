<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chromebook等 貸出管理システム</title>
  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
  <style>
    body { font-family: sans-serif; background: #f4f6f9; padding: 15px; }
    #status { padding: 20px; background: #fff; border-left: 10px solid #ccc; margin-bottom: 20px; font-weight: bold; }
    #video { width: 100%; max-width: 400px; background: #000; display: block; margin: 0 auto; }
    #action-btn { width: 100%; padding: 20px; font-size: 18px; margin-top: 10px; }
  </style>
</head>
<body>
  <h2>貸出管理システム</h2>
  <div id="status">カメラ起動中...</div>
  <video id="video" autoplay playsinline muted></video>
  <button id="action-btn">スキャン開始</button>

  <script>
    const FORM_URL = "https://docs.google.com/forms/d/e/1FAIpQLSdWhiNc9YuYfA61ONMIBHAx9MhegFJRCIdCwVWyorLlXO4Xgw/formResponse";
    const ENTRY_MODE = "entry.866648275";
    const ENTRY_DATA1 = "entry.1165154720";
    const ENTRY_DATA2 = "entry.1094519910";
    const STOCK_API_URL = "https://script.google.com/a/macros/city.hamamatsu-szo.ed.jp/s/AKfycbxGmBTg8T4quolzCtotdF3j_V0iWTpd7O2wvbsZ0i3saM3pAPekDj98npUVaGCqe2oMFQ/exec";

    // バリデーション付き送信処理
    async function executeSubmit(mode, data1, data2) {
      document.getElementById('status').innerText = "⏳ 確認中...";
      
      const checkUrl = `${STOCK_API_URL}${STOCK_API_URL.includes('?') ? '&' : '?'}action=checkStatus&mode=${encodeURIComponent(mode)}&id1=${encodeURIComponent(data1)}&id2=${encodeURIComponent(data2)}&callback=jsonp_check`;
      
      const result = await new Promise(resolve => {
        window.jsonp_check = resolve;
        const script = document.createElement('script');
        script.src = checkUrl;
        document.body.appendChild(script);
      });

      if (result.status === "error") {
        document.getElementById('status').innerText = "❌ " + result.message;
        setTimeout(() => location.reload(), 3000);
        return;
      }

      const formData = new FormData();
      formData.append(ENTRY_MODE, mode);
      formData.append(ENTRY_DATA1, data1);
      formData.append(ENTRY_DATA2, data2);
      
      fetch(FORM_URL, { method: 'POST', body: formData, mode: 'no-cors' }).then(() => {
        document.getElementById('status').innerText = "✅ 完了しました";
        setTimeout(() => location.reload(), 2000);
      });
    }

    // カメラ起動処理
    navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
      .then(stream => { document.getElementById('video').srcObject = stream; document.getElementById('status').innerText = "準備完了"; })
      .catch(err => { document.getElementById('status').innerText = "カメラエラー: " + err.message; });
      
    document.getElementById('action-btn').onclick = () => {
      // ここにテスト用の呼び出し例
      executeSubmit("利用者へ貸出", "1234", "R7HC0001");
    };
  </script>
</body>
</html>
