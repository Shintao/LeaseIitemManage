<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>【実験用】貸出デバッグ用システム</title>
  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
  <style>
    /* レイアウトの影響を排除するため、極めてシンプルな上から順の配置にします */
    body { font-family: sans-serif; margin: 15px; background: #fafafa; color: #333; }
    h2 { font-size: 16px; margin: 0 0 10px 0; }
    select { width: 100%; padding: 10px; font-size: 16px; margin-bottom: 10px; }
    
    /* カメラ枠：ズレが起きないよう、素のサイズで中央表示 */
    #video-container { width: 100%; max-width: 400px; background: #000; position: relative; margin-bottom: 10px; }
    video { width: 100%; height: auto; display: block; }
    
    /* ボタンエリア：シンプルに横並び */
    .btn-group { display: flex; gap: 10px; margin-bottom: 10px; }
    button { flex: 2; padding: 15px; font-size: 16px; font-weight: bold; cursor: pointer; }
    #cancel-btn { flex: 1; background: #ff4d4d; color: white; border: none; }
    
    #status { padding: 10px; background: #fff; border: 2px solid #ccc; font-weight: bold; margin-bottom: 10px; white-space: pre-wrap; }
    
    /* 🚨 デバッグ用ログエリア */
    #debug-console { background: #222; color: #00ff00; font-family: monospace; font-size: 11px; padding: 10px; border-radius: 5px; height: 180px; overflow-y: scroll; }
  </style>
</head>
<body>

  <h2>【実験用】貸出管理（デバッグ表示付き）</h2>

  <select id="mode-select">
    <option value="生徒へ貸出">📤 生徒へ貸出（2回スキャン）</option>
    <option value="生徒から返却">📥 生徒から返却（1回スキャン）</option>
  </select>

  <div id="video-container">
    <video id="video" autoplay playsinline muted></video>
  </div>

  <div class="btn-group">
    <button id="action-btn">🔍 スキャン開始</button>
    <button id="cancel-btn">🛑 中断</button>
  </div>
  
  <div id="status">カメラ初期化中...</div>

  <h3>🚨 システム内部ログ</h3>
  <div id="debug-console">--- ログ開始 ---<br></div>

  <canvas id="canvas" style="display:none;"></canvas>

  <script>
    const FORM_URL = "https://docs.google.com/forms/d/e/1FAIpQLSdWhiNc9YuYfA61ONMIBHAx9MhegFJRCIdCwVWyorLlXO4Xgw/formResponse";
    const ENTRY_MODE = "entry.866648275";
    const ENTRY_DATA1 = "entry.1165154720";
    const ENTRY_DATA2 = "entry.1094519910";
    const STOCK_API_URL = ""; 

    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const statusDiv = document.getElementById('status');
    const actionBtn = document.getElementById('action-btn');
    const cancelBtn = document.getElementById('cancel-btn');
    const modeSelect = document.getElementById('mode-select');
    const debugConsole = document.getElementById('debug-console');
    
    let isScanning = false; 
    let savedStudentId = "https://script.google.com/a/macros/city.hamamatsu-szo.ed.jp/s/AKfycbxETi6p3169mYdsFkBWyeijQwa14SzWEAxlgrbLJO97pcajwxpkzwTiP_CKAkzEfghI1Q/exec"; 
    let tickCount = 0; // ループが回っているか数える変数

    // 画面にログを吐き出す関数
    function log(msg) {
      const now = new Date();
      const timeStr = now.toLocaleTimeString();
      debugConsole.innerHTML += `[${timeStr}] ${msg}<br>`;
      debugConsole.scrollTop = debugConsole.scrollHeight; // 常に最下部へ
    }

    modeSelect.addEventListener('change', () => {
      log(`モード変更 -> ${modeSelect.value}`);
      resetSystem();
    });

    // 🔍 スキャン開始ボタン
    actionBtn.addEventListener('click', () => {
      if (isScanning) {
        log("警告: すでにスキャン作動中のため無視しました");
        return;
      }
      
      isScanning = true;
      tickCount = 0;
      actionBtn.disabled = true;
      
      if (modeSelect.value === "生徒へ貸出") {
        if (!savedStudentId) {
          log("【1回目開始】生徒IDを待っています...");
          statusDiv.innerText = "【1回目：生徒ID】\n4桁数字のQRをかざしてください。";
        } else {
          log(`【2回目開始】端末QRを待っています... (ターゲット生徒: ${savedStudentId})`);
          statusDiv.innerText = `【2回目：機体QR】\n端末のQRをかざしてください。\n(生徒: ${savedStudentId})`;
        }
      } else {
        log("【返却開始】返却端末のQRを待っています...");
        statusDiv.innerText = "【返却】端末のQRをかざしてください。";
      }

      // 明示的にループを起動
      log("tick() ループを起動します");
      tick();
    });

    // 🛑 中断（キャンセル）ボタン
    cancelBtn.addEventListener('click', () => {
      log("🛑 中断ボタンが押されました。状態をリセットします。");
      resetSystem();
    });

    function resetSystem() {
      isScanning = false;
      savedStudentId = "";
      actionBtn.disabled = false;
      if (modeSelect.value === "生徒へ貸出") {
        actionBtn.innerText = "🔍 1回目：生徒ID スキャン開始";
        statusDiv.innerText = "【貸出】上のボタンを押して生徒IDをスキャンしてください。";
      } else {
        actionBtn.innerText = "🔍 返却スキャン開始";
        statusDiv.innerText = "【返却】上のボタンを押してスキャンしてください。";
      }
      log("システムが初期（待機）状態に戻りました。");
    }

    // カメラの起動
    log("カメラアクセスを要請中...");
    navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" }, audio: false })
    .then(stream => { 
      video.srcObject = stream; 
      log("✅ カメラ起動成功");
      resetSystem();
    })
    .catch(err => { 
      log(`❌ カメラ起動エラー: ${err.message}`);
      statusDiv.innerText = "カメラエラーが発生しました。";
    });

    // 脳ミソ（ループ処理）
    function tick() {
      if (!isScanning) {
        // ボタンを押していない時は、このログすら出ずに完全に処理を抜けます
        return; 
      } 

      tickCount++;
      // ログが埋まるのを防ぐため、50コマ（約1秒）ごとにループ生存ログを出す
      if (tickCount % 50 === 1) {
        log(`... スキャンループ回転中 (計 ${tickCount} コマ目)`);
      }

      if (video.readyState === video.HAVE_ENOUGH_DATA) {
        const context = canvas.getContext('2d');
        canvas.height = video.videoHeight; 
        canvas.width = video.videoWidth;
        context.drawImage(video, 0, 0, canvas.width, canvas.height);
        
        const imageData = context.getImageData(0, 0, canvas.width, canvas.height);
        const code = jsQR(imageData.data, imageData.width, imageData.height, { inversionAttempts: "dontInvert" });

        if (code) {
          const scannedText = code.data.trim();
          log(`🎯 QRコードを検出！ 中身: [${scannedText}]`);
          
          // 残像ガード
          if (modeSelect.value === "生徒へ貸出" && savedStudentId !== "" && scannedText === savedStudentId) {
            // 2回目スキャン中なのに、1回目の生徒IDがまだ見えている場合は無視して継続
            requestAnimationFrame(tick);
            return;
          }
          
          isScanning = false; // 読み取れたのでループを止める
          log("スキャン成功につきループを一時停止します。データ処理へ移行。");
          handleScannedData(scannedText);
          return; 
        }
      }
      // 次のフレームを要求
      requestAnimationFrame(tick);
    }

    function handleScannedData(scannedText) {
      if (modeSelect.value === "生徒へ貸出") {
        if (!savedStudentId) {
          // 1回目：生徒IDの場合
          if (/^\d{4}$/.test(scannedText)) { 
            savedStudentId = scannedText;
            log(`✅ 生徒ID [${savedStudentId}] を正常にロック。1回目クリア。`);
            actionBtn.innerText = "🔍 2回目：端末QR スキャン開始";
            actionBtn.disabled = false;
            statusDiv.innerText = `👤 生徒 [${savedStudentId}] をロック中。\n\n端末のQRを準備して、上の「2回目：端末QR スキャン開始」を押してください。`;
          } else {
            log(`❌ 判定エラー: [${scannedText}] は4桁の数字ではありません。`);
            statusDiv.innerText = "❌ 生徒ID（4桁数字）ではありません。やり直してください。";
            setTimeout(() => { resetSystem(); }, 2500);
          }
        } else {
          // 2回目：端末QRの場合
          log(`🚀 最終送信へ: 生徒[${savedStudentId}] + 端末[${scannedText}]`);
          executeSubmit(modeSelect.value, savedStudentId, scannedText);
        }
      } else {
        // 返却
        log(`🚀 返却送信へ: 端末[${scannedText}]`);
        executeSubmit(modeSelect.value, scannedText, "");
      }
    }

    async function executeSubmit(mode, data1, data2) {
      statusDiv.innerText = "⏳ フォーム送信中...";
      const formData = new FormData();
      formData.append(ENTRY_MODE, mode);
      formData.append(ENTRY_DATA1, data1);
      formData.append(ENTRY_DATA2, data2);

      try {
        await fetch(FORM_URL, { method: "POST", mode: "no-cors", body: formData });
        log("✅ Googleフォームへの送信シミュレーション完了（no-cors）");
        statusDiv.innerText = `✅ 送信完了！\nデータ1: ${data1}\nデータ2: ${data2}`;
      } catch (e) {
        log(`❌ 送信エラー: ${e.message}`);
        statusDiv.innerText = "❌ 送信に失敗しました。";
      }
      setTimeout(() => { resetSystem(); }, 3000);
    }
  </script>
</body>
</html>
